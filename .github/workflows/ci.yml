name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  CARGO_TARGET_DIR: /tmp/cargo-target
  CARGO_FEATURES: "--no-default-features --features aws-providers,telemetry,otel,rustls-tls"

jobs:
  # ── Rust ────────────────────────────────────────────────────────────────────
  rust:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libxcb1-dev libxrandr-dev libdbus-1-dev \
            pkg-config protobuf-compiler libprotobuf-dev
      - name: cargo fmt check
        run: cargo fmt --all -- --check
      - name: Cargo check
        run: cargo check -p goose -p goose-cli -p goose-mcp -p goose-server -p goose-acp $CARGO_FEATURES
      - name: Clippy
        run: cargo clippy -p goose -p goose-cli -p goose-mcp -p goose-server -p goose-acp $CARGO_FEATURES -- -D warnings
      - name: Rust tests
        run: cargo test -p goose $CARGO_FEATURES -- --nocapture 2>&1 | tail -50

  # ── Python MCP server ────────────────────────────────────────────────────────
  python:
    name: MCP server tests
    runs-on: ubuntu-latest
    env:
      NEXUS_AUTH_TOKEN: test-token-ci
      OLLAMA_HOST: http://localhost:11434
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r mcp-server/requirements.txt
      - name: MCP server smoke — import check
        run: python -c "import sys; sys.path.insert(0,'mcp-server'); from config import settings; print('config OK', settings.OLLAMA_HOST)"
      - name: pytest (repo root, pythonpath via pytest.ini)
        run: pytest mcp-server/tests knowledge/tests -q --tb=short

  # ── Docker compose config ────────────────────────────────────────────────────
  compose:
    name: Compose config check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docker compose config
        run: docker compose config > /dev/null

  # ── Secret scan ──────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for leaked credentials
        run: |
          if grep -RInE \
            '(ghp_[A-Za-z0-9]{20,}|xai-[A-Za-z0-9]{20,}|AIza[0-9A-Za-z_-]{20,}|dop_v1_[A-Za-z0-9]{20,}|sk-[A-Za-z0-9_-]{20,}|gsk_[A-Za-z0-9_]{20,}|rpa_[A-Za-z0-9]{20,})' \
            --exclude-dir='.git' \
            --exclude='*.env' \
            --exclude-dir='docs' \
            .; then
            echo "ERROR: leaked credential pattern found"
            exit 1
          fi
          echo "No credential patterns detected."
      - name: No hardcoded private IPs
        run: |
          if grep -RInE '(164\.90\.[0-9]+\.[0-9]+|46\.101\.[0-9]+\.[0-9]+)' \
            --exclude-dir='.git' --exclude-dir='docs' .; then
            echo "ERROR: private IP found"
            exit 1
          fi
          echo "No private IPs detected."
