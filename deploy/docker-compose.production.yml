# Production deployment for Gangoos-coder on Digital Ocean
# Includes reverse proxy with SSL, auto-updates, and rate limiting
#
# Usage:
#   docker compose -f docker-compose.production.yml up -d
#
# Requires:
#   - .env with NEXUS_AUTH_TOKEN, DOMAIN, LETSENCRYPT_EMAIL
#   - Cloudflare DNS pointing DOMAIN → droplet IP

version: "3.8"

services:
  # ─────────────────────────────────────────────────────────────────────────
  # Gangoos Agent (port 3000 → internal)
  # ─────────────────────────────────────────────────────────────────────────
  gangoos-agent:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/goosed"]
    command: ["agent"]
    env_file:
      - .env
    environment:
      GOOSE_HOST: 0.0.0.0
      GOOSE_PORT: 3000
      GOOSE_TLS: "false"
      GOOSE_PROVIDER: ${GOOSE_PROVIDER:-xai}
      GOOSE_MODEL: ${GOOSE_MODEL:-grok-4-1-fast-reasoning}
      NEXUS_URL: http://mcp-server:8080
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
    expose:
      - "3000"
    depends_on:
      mcp-server:
        condition: service_healthy
    volumes:
      - ./:/workspace
    working_dir: /workspace
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # MCP Server (port 8080 → internal)
  # ─────────────────────────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: 8080
      MCP_ALLOWED_HOSTS: localhost,127.0.0.1,mcp-server,gangoos-agent,nginx
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      MOJO_EXEC_BACKEND: ${MOJO_EXEC_BACKEND:-disabled}
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./:/workspace
    working_dir: /app
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Ollama + Qwen3:8b (local LLM, port 11434 → internal)
  # Set OLLAMA_HOST env var to point at remote machine if not local
  # ─────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Nginx Reverse Proxy with SSL (Let's Encrypt via Certbot)
  # ─────────────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - certbot_data:/etc/letsencrypt
    depends_on:
      - gangoos-agent
      - mcp-server
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Certbot for Let's Encrypt SSL renewal
  # ─────────────────────────────────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_data:/etc/letsencrypt
      - ./certbot-entrypoint.sh:/entrypoint.sh:ro
    entrypoint: /entrypoint.sh
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-noreply@example.com}
    depends_on:
      - nginx
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────────────────────
  # Redis for rate limiting (optional but recommended for production)
  # ─────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────────────────────────────────
  # Watchtower for automatic Docker image updates
  # Monitors and auto-updates running containers when images change
  # ─────────────────────────────────────────────────────────────────────────
  watchtower:
    image: containrrr/watchtower:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:
    driver: local
  redis_data:
    driver: local
  certbot_data:
    driver: local

networks:
  default:
    driver: bridge
