services:
  gangoos-agent:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/goosed"]
    command: ["agent"]
    env_file:
      - path: .env
        required: false
    environment:
      GOOSE_HOST: ${GOOSE_HOST:-0.0.0.0}
      GOOSE_PORT: ${GOOSE_PORT:-3000}
      GOOSE_TLS: ${GOOSE_TLS:-false}
      GOOSE_PROVIDER: ${GOOSE_PROVIDER:-ollama}
      GOOSE_MODEL: ${GOOSE_MODEL:-qwen3:8b}
      NEXUS_URL: ${NEXUS_URL:-http://mcp-server:8080}
      OLLAMA_HOST: ${OLLAMA_HOST}
    ports:
      - "3000:3000"
    depends_on:
      - mcp-server
    volumes:
      - ./:/workspace
    working_dir: /workspace

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-8080}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,mcp-server,gangoos-agent}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen3:8b}
      MOJO_EXEC_BACKEND: ${MOJO_EXEC_BACKEND:-disabled}
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
    working_dir: /app

  ollama:
    profiles: ["llm"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./llm/Modelfile:/tmp/Modelfile:ro
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
    restart: unless-stopped

volumes:
  ollama_data:
