services:
  gangus-agent:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/usr/local/bin/goosed"]
    command: ["agent"]
    env_file:
      - .env
    environment:
      GOOSE_HOST: ${GOOSE_HOST:-0.0.0.0}
      GOOSE_PORT: ${GOOSE_PORT:-3000}
      GOOSE_TLS: ${GOOSE_TLS:-false}
      GOOSE_PROVIDER: ${GOOSE_PROVIDER:-xai}
      GOOSE_MODEL: ${GOOSE_MODEL:-grok-4-1-fast-reasoning}
      NEXUS_URL: ${NEXUS_URL:-http://mcp-server:8080}
    ports:
      - "3000:3000"
    depends_on:
      - mcp-server
    volumes:
      - ./:/workspace
    working_dir: /workspace

  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: ${PORT:-8080}
      MCP_ALLOWED_HOSTS: ${MCP_ALLOWED_HOSTS:-localhost,127.0.0.1,mcp-server,gangus-agent}
    ports:
      - "8080:8080"
    volumes:
      - ./:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /app
