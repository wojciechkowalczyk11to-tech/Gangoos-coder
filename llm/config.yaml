# Gangus LLM — Qwen3:8b via Ollama
# Running on gangus-llm VM (164.90.217.149)
# Configure via env vars — never hardcode IPs

ollama:
  host: "${OLLAMA_HOST:-http://164.90.217.149:11434}"
  model: "${OLLAMA_MODEL:-gangus}"          # custom Modelfile variant
  fallback_model: "qwen3:8b"               # base model if Modelfile not loaded
  timeout: 120
  context_length: 32768

# MCP server connection (gangus-coder VM)
mcp:
  url: "${MCP_URL:-http://46.101.108.96:8080/mcp}"
  auth_token: "${NEXUS_AUTH_TOKEN}"

# Inference settings
inference:
  temperature: 0.6
  top_p: 0.9
  max_tokens: 8192
  stream: true

# Fallback providers (used when Ollama is offline)
fallbacks:
  - provider: groq
    model: qwen-qwq-32b
    env_key: GROQ_API_KEY
  - provider: deepseek
    model: deepseek-chat
    env_key: DEEPSEEK_API_KEY
